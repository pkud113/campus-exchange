name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        # pnpm 11 uses npm's supported bulk-advisory audit endpoint.
        with: { version: 11.13.0 }
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@v1
        with: { version: 2.109.1 }
      - run: pnpm install --frozen-lockfile
      - name: Validate migrations on local PostgreSQL
        run: |
          supabase start
          supabase db reset
      - name: Lint database functions and schemas
        run: supabase db lint --local --schema public,private --level error --fail-on error
      - name: Run pgTAP database tests
        run: supabase test db --local supabase/tests
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
