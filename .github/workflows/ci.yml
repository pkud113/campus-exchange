name: CI
on:
  workflow_call:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        # pnpm 11 uses npm's supported bulk-advisory audit endpoint.
        with: { version: 11.13.0 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with: { version: 2.109.1 }
      - run: pnpm install --frozen-lockfile
      - name: Validate migrations on local PostgreSQL
        run: |
          supabase start
          supabase db reset
      - name: Lint database functions and schemas
        run: supabase db lint --local --schema public,private --level error --fail-on error
      - name: Run pgTAP database tests
        run: supabase test db --local supabase/tests
      - name: Export local Supabase browser-test environment
        shell: bash
        run: |
          supabase status -o env > "$RUNNER_TEMP/supabase.env"
          source "$RUNNER_TEMP/supabase.env"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"
          echo "APP_ORIGIN=http://127.0.0.1:3100" >> "$GITHUB_ENV"
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Install Playwright Chromium
        run: pnpm --filter @campus-exchange/web exec playwright install --with-deps chromium
      - name: Run desktop, mobile, and accessibility smoke tests
        run: pnpm --filter @campus-exchange/web e2e
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate
