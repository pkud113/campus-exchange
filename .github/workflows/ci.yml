name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@v1
        with: { version: 2.101.0 }
      - run: pnpm install --frozen-lockfile
      - name: Validate migrations on local PostgreSQL
        run: |
          supabase start
          supabase db reset
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
