name: Deploy production

on:
  workflow_dispatch:
    inputs:
      web_only:
        description: Deploy only the web application without database or background-worker changes
        required: false
        default: false
        type: boolean
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ORIGIN: https://campus-exchange.net
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      WEB_ONLY: ${{ (github.event_name == 'workflow_dispatch' && inputs.web_only == true) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[web-only]')) }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v1
        if: ${{ env.WEB_ONLY != 'true' }}
        with:
          version: 2.109.1

      - name: Validate deployment credentials
        shell: bash
        run: |
          required=(NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF SUPABASE_SECRET_KEY TURNSTILE_SECRET_KEY NEXT_PUBLIC_TURNSTILE_SITE_KEY CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID RESEND_API_KEY EMAIL_FROM)
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub production secret: $key" >&2
              exit 1
            fi
          done

      - name: Validate Turnstile secret
        shell: bash
        run: |
          result="$(curl --fail-with-body --silent --show-error --retry 3 \
            --request POST 'https://challenges.cloudflare.com/turnstile/v0/siteverify' \
            --data-urlencode "secret=$TURNSTILE_SECRET_KEY" \
            --data-urlencode 'response=')"
          echo "$result" | jq -e '
            (.["error-codes"] // []) as $codes
            | (($codes | index("invalid-input-secret")) == null)
              and (($codes | index("missing-input-response")) != null)
          ' >/dev/null

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Validate linked database release
        if: ${{ env.WEB_ONLY != 'true' }}
        shell: bash
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase migration list --linked
          supabase db push --linked --include-all --dry-run
          supabase db advisors --linked --type all --level warn --fail-on error

      - name: Ensure private media bucket exists
        if: ${{ env.WEB_ONLY != 'true' }}
        shell: bash
        run: |
          if ! pnpm --dir apps/worker exec wrangler r2 bucket list | grep -q 'campus-exchange-media'; then
            pnpm --dir apps/worker exec wrangler r2 bucket create campus-exchange-media
          fi

      # The forward-compatible worker must understand every new outbox event before
      # the database migration can begin emitting those event types.
      - name: Deploy forward-compatible background worker
        if: ${{ env.WEB_ONLY != 'true' }}
        run: pnpm --filter @campus-exchange/worker run deploy

      - name: Apply production database migrations
        if: ${{ env.WEB_ONLY != 'true' }}
        run: |
          supabase db push --linked --include-all
          supabase db advisors --linked --type all --level warn --fail-on error

      - name: Configure Supabase Auth email delivery
        if: ${{ env.WEB_ONLY != 'true' }}
        shell: bash
        run: |
          payload="$(jq -n \
            --arg site "$APP_ORIGIN" \
            --arg smtp_password "$RESEND_API_KEY" \
            '{
              external_email_enabled: true,
              mailer_autoconfirm: false,
              site_url: $site,
              uri_allow_list: ($site + "/auth/callback," + $site + "/recover," + $site + "/onboarding"),
              smtp_admin_email: "access@campus-exchange.net",
              smtp_host: "smtp.resend.com",
              smtp_port: "465",
              smtp_user: "resend",
              smtp_pass: $smtp_password,
              smtp_sender_name: "Campus Exchange",
              password_min_length: 12,
              mailer_otp_exp: 600,
              mailer_subjects_confirmation: "Your Campus Exchange verification code",
              mailer_templates_confirmation_content: "<h2>Verify your Campus Exchange account</h2><p>Enter this six-digit code in Campus Exchange:</p><p style=\"font-size:32px;font-weight:700;letter-spacing:6px\">{{ .Token }}</p><p>This code expires in 10 minutes. If you did not request it, you can ignore this email.</p>",
              mailer_subjects_magic_link: "Your Campus Exchange sign-in code",
              mailer_templates_magic_link_content: "<h2>Your Campus Exchange code</h2><p>Enter this six-digit code in Campus Exchange:</p><p style=\"font-size:32px;font-weight:700;letter-spacing:6px\">{{ .Token }}</p><p>This code expires in 10 minutes. If you did not request it, you can ignore this email.</p>",
              mailer_subjects_recovery: "Your Campus Exchange recovery code",
              mailer_templates_recovery_content: "<h2>Reset your Campus Exchange password</h2><p>Enter this six-digit recovery code:</p><p style=\"font-size:32px;font-weight:700;letter-spacing:6px\">{{ .Token }}</p><p>This code expires in 10 minutes. If you did not request it, you can ignore this email.</p>",
              mailer_subjects_invite: "Your Campus Exchange staff invitation",
              mailer_templates_invite_content: "<h2>Campus Exchange staff invitation</h2><p>Enter this six-digit invitation code during staff setup:</p><p style=\"font-size:32px;font-weight:700;letter-spacing:6px\">{{ .Token }}</p><p>This code expires in 10 minutes.</p>",
              mailer_notifications_password_changed_enabled: true
            }')"
          curl --fail-with-body --silent --show-error --retry 3 \
            --request PATCH "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/config/auth" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" >/dev/null
          curl --fail --silent --show-error \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/config/auth" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            | jq -e --arg site "$APP_ORIGIN" \
              '.site_url == $site
                and .smtp_host == "smtp.resend.com"
                and .smtp_admin_email == "access@campus-exchange.net"
                and .mailer_subjects_confirmation == "Your Campus Exchange verification code"
                and ((.mailer_templates_confirmation_content // "") | contains("{{ .Token }}"))
                and .mailer_subjects_magic_link == "Your Campus Exchange sign-in code"
                and ((.mailer_templates_magic_link_content // "") | contains("{{ .Token }}"))
                and .mailer_subjects_recovery == "Your Campus Exchange recovery code"
                and .password_min_length == 12' >/dev/null

      - name: Deploy web application
        run: pnpm --filter @campus-exchange/web run deploy

      - name: Configure web runtime secrets
        shell: bash
        run: |
          printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | pnpm --dir apps/worker exec wrangler secret put NEXT_PUBLIC_SUPABASE_URL --name campus-exchange-web
          printf '%s' "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" | pnpm --dir apps/worker exec wrangler secret put NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY --name campus-exchange-web
          printf '%s' "$SUPABASE_SECRET_KEY" | pnpm --dir apps/worker exec wrangler secret put SUPABASE_SECRET_KEY --name campus-exchange-web
          printf '%s' "$NEXT_PUBLIC_TURNSTILE_SITE_KEY" | pnpm --dir apps/worker exec wrangler secret put NEXT_PUBLIC_TURNSTILE_SITE_KEY --name campus-exchange-web
          printf '%s' "$TURNSTILE_SECRET_KEY" | pnpm --dir apps/worker exec wrangler secret put TURNSTILE_SECRET_KEY --name campus-exchange-web
          printf '%s' "$APP_ORIGIN" | pnpm --dir apps/worker exec wrangler secret put APP_ORIGIN --name campus-exchange-web

      - name: Configure worker runtime secrets
        if: ${{ env.WEB_ONLY != 'true' }}
        shell: bash
        run: |
          printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | pnpm --dir apps/worker exec wrangler secret put SUPABASE_URL --name campus-exchange-worker
          printf '%s' "$SUPABASE_SECRET_KEY" | pnpm --dir apps/worker exec wrangler secret put SUPABASE_SECRET_KEY --name campus-exchange-worker
          printf '%s' "$RESEND_API_KEY" | pnpm --dir apps/worker exec wrangler secret put RESEND_API_KEY --name campus-exchange-worker
          printf '%s' "$EMAIL_FROM" | pnpm --dir apps/worker exec wrangler secret put EMAIL_FROM --name campus-exchange-worker
          printf '%s' "$APP_ORIGIN" | pnpm --dir apps/worker exec wrangler secret put APP_ORIGIN --name campus-exchange-worker

      - name: Verify production health
        shell: bash
        run: |
          for attempt in {1..12}; do
            if curl --fail --silent --show-error https://campus-exchange.net/api/health >/dev/null \
              && curl --fail --silent --show-error https://campus-exchange.net/ >/dev/null \
              && curl --fail --silent --show-error --location --max-redirs 2 https://www.campus-exchange.net/ >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1
