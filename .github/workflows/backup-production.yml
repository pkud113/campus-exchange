name: Backup production database

on:
  schedule:
    - cron: "17 8 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate backup credentials
        shell: bash
        run: |
          test -n "$SUPABASE_DB_URL"
          test -n "$BACKUP_ENCRYPTION_PASSWORD"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
      - name: Ensure private backup bucket exists
        shell: bash
        run: |
          if ! pnpm --dir apps/worker exec wrangler r2 bucket list | grep -q 'campus-exchange-backups'; then
            pnpm --dir apps/worker exec wrangler r2 bucket create campus-exchange-backups
          fi
      - name: Dump, encrypt, and upload database
        shell: bash
        run: |
          stamp="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          pg_dump "$SUPABASE_DB_URL" --format=custom --no-owner --no-acl --file="database.dump"
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 -in database.dump -out "database-$stamp.dump.enc" -pass env:BACKUP_ENCRYPTION_PASSWORD
          pnpm --dir apps/worker exec wrangler r2 object put "campus-exchange-backups/database/database-$stamp.dump.enc" --file "../../database-$stamp.dump.enc"
