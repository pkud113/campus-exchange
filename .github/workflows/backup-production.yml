name: Backup production database

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.101.0
      - run: pnpm install --frozen-lockfile
      - name: Validate backup credentials
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$BACKUP_ENCRYPTION_PASSWORD"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
      - name: Ensure private backup bucket exists
        shell: bash
        run: |
          if ! pnpm --dir apps/worker exec wrangler r2 bucket list | grep -q 'campus-exchange-backups'; then
            pnpm --dir apps/worker exec wrangler r2 bucket create campus-exchange-backups
          fi
      - name: Dump, encrypt, and upload database
        shell: bash
        run: |
          stamp="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db dump --linked --file database.sql
          test -s database.sql
          grep -q "PostgreSQL database dump" database.sql
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 -in database.sql -out "database-$stamp.sql.enc" -pass env:BACKUP_ENCRYPTION_PASSWORD
          pnpm --dir apps/worker exec wrangler r2 object put "campus-exchange-backups/database/database-$stamp.sql.enc" --file "../../database-$stamp.sql.enc"
